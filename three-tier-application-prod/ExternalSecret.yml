apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mysql-secret
  namespace: three-tier
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: mysql-secret
  data:
  - secretKey: MYSQL_USER
    remoteRef:
      key: prod/mysql-secret
      property: username
  - secretKey: MYSQL_PASSWORD
    remoteRef:
      key: prod/mysql-secret
      property: password